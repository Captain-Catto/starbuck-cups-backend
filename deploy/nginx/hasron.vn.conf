server {
    listen 80;
    listen [::]:80;
    server_name hasron.vn www.hasron.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hasron.vn www.hasron.vn;

    # SSL managed by Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/hasron.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hasron.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/starbuck-cups-frontend;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # Serve robots.txt and sitemap.xml directly (don't fall back to SPA)
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain";
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type "application/xml";
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Keep SPA shell fresh while static assets are heavily cached.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Static assets with content hashes - cache aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Fonts - cache for 1 year
    location /font/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*";
    }

    # Images and other static files
    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|avif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
