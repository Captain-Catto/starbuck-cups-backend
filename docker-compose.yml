services:
  postgres:
    image: postgres:16-alpine
    container_name: starbucks-postgres
    restart: unless-stopped
    # Tune for SSD VPS with ~2GB RAM. Adjust shared_buffers/effective_cache_size
    # to ~25%/75% of actual RAM if server has more memory.
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_compression=on
      -c max_connections=100
      -c idle_in_transaction_session_timeout=30000
    environment:
      POSTGRES_DB: starbucks_shop
      POSTGRES_USER: starbuck
      POSTGRES_PASSWORD: 0906862256
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: starbucks-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-this-meili-master-key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: starbucks-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starbucks-backend
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080

      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: "false"
      DB_SCHEMA: ${DB_SCHEMA:-nhhas72k_starbucks_shop}

      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILI_MASTER_KEY:-change-this-meili-master-key}

      JWT_SECRET: ${JWT_SECRET:-change-this-session-secret}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      EXPOSE_REFRESH_TOKEN: ${EXPOSE_REFRESH_TOKEN:-false}
      AUTH_RATE_LIMIT_STORE: ${AUTH_RATE_LIMIT_STORE:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      ALLOW_IN_MEMORY_RATE_LIMIT: ${ALLOW_IN_MEMORY_RATE_LIMIT:-false}
      RATE_LIMIT_MAX_ATTEMPTS: ${RATE_LIMIT_MAX_ATTEMPTS:-5}
      RATE_LIMIT_BLOCK_DURATION_MS: ${RATE_LIMIT_BLOCK_DURATION_MS:-900000}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      INCLUDE_LOCAL_ORIGINS: ${INCLUDE_LOCAL_ORIGINS:-true}
      DB_SYNC_ON_START: ${DB_SYNC_ON_START:-false}
      SESSION_STORE_SYNC_ON_START: ${SESSION_STORE_SYNC_ON_START:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      REQUEST_LOG_ENABLED: ${REQUEST_LOG_ENABLED:-true}
      SOCKET_LOG_ENABLED: ${SOCKET_LOG_ENABLED:-true}

      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}

      SENTRY_DSN: ${SENTRY_DSN:-}

      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      GOOGLE_DRIVE_REFRESH_TOKEN: ${GOOGLE_DRIVE_REFRESH_TOKEN:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      MAX_FILE_SIZE: "10485760"
      MAX_REQUEST_SIZE: "52428800"
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_data:
  meili_data:
  redis_data:
